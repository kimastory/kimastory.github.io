<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>주문 조회</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        #orderProgress { display: none; }
        .progress-bar { display: flex; justify-content: space-between; margin-top: 20px; }
        .step { width: 30px; height: 30px; border-radius: 50%; background-color: #ddd; display: flex; justify-content: center; align-items: center; }
        .active { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>
    <h1>주문 조회</h1>
    <input type="text" id="orderNumber" placeholder="12자리 주문번호 입력" maxlength="12">
    <button onclick="checkOrder()">조회</button>
    <div id="orderProgress">
        <h2>주문 진행 상황</h2>
        <div class="progress-bar">
            <div class="step" id="step1">1</div>
            <div class="step" id="step2">2</div>
            <div class="step" id="step3">3</div>
            <div class="step" id="step4">4</div>
            <div class="step" id="step5">5</div>
            <div class="step" id="step6">6</div>
            <div class="step" id="step7">7</div>
        </div>
    </div>
    <p id="message"></p>
    <script>
        function checkOrder() {
            var orderNumber = document.getElementById('orderNumber').value;
            if (orderNumber.length !== 12) {
                alert('주문번호는 12자리여야 합니다.');
                return;
            }

            var scriptUrl = 'https://script.google.com/macros/s/AKfycbyYbF3UngA5Qzi69cNWFl2XOs9Lk6WURBnaQ5sNdcEQ9pPAJ5JaYaIEwjXJImkvVCI/exec';
            fetch(`${scriptUrl}?orderNumber=${orderNumber}`)
                .then(response => response.json())
                .then(data => {
                    var messageElement = document.getElementById('message');
                    var orderProgressElement = document.getElementById('orderProgress');
                    if (data.found) {
                        messageElement.textContent = `주문이 확인되었습니다. 현재 단계: ${data.stage}`;
                        orderProgressElement.style.display = 'block';
                        updateProgressBar(data.stage);
                    } else {
                        messageElement.textContent = '주문을 찾을 수 없습니다..';
                        orderProgressElement.style.display = 'none';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    document.getElementById('message').textContent = '오류가 발생했습니다. 다시 시도해주세요.';
                });
        }

        function updateProgressBar(stage) {
            for (var i = 1; i <= 7; i++) {
                var stepElement = document.getElementById('step' + i);
                if (i <= stage) {
                    stepElement.classList.add('active');
                } else {
                    stepElement.classList.remove('active');
                }
            }
        }
    </script>
</body>
</html>
